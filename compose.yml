name: blood-platform

services:
  analytics:
    build: ./analytics
    container_name: analytics
    restart: on-failure:5
    environment:
      CRON_PATTERN: "2 6 * * *"
      DATABASE_URL: postgres://minhtriet:blood_platform@database:5432/blood_platform?sslmode=disable
    volumes:
      - ./.docker/analytics/reports:/app/reports
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: frontend
    restart: on-failure:5
    ports:
      - 80:80
    environment:
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: on-failure:5
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql+psycopg://minhtriet:blood_platform@database/blood_platform
    depends_on:
      - database

  database:
    image: postgres:18-alpine
    container_name: postgresql
    restart: on-failure:5
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: minhtriet
      POSTGRES_DB: blood_platform
      POSTGRES_PASSWORD: blood_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  database-admin:
    image: dpage/pgadmin4:9
    container_name: pgadmin
    restart: on-failure:5
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@database.xyz
      PGADMIN_DEFAULT_PASSWORD: TuritoPassword6561
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - database

volumes:
    pgadmin:
    postgres_data:
